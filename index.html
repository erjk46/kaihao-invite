<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安徽凯豪药业开业盛典邀请函</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #222;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .invitation-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .page.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <div class="page active" style="background-image: url('images/page1.png');"></div>
        <div class="page" style="background-image: url('images/page2.png');"></div>
        <div class="page" style="background-image: url('images/page3.png');"></div>
        <div class="page" style="background-image: url('images/page4.png');"></div>
        <div class="page" style="background-image: url('images/page5.png');"></div>
        <div class="page" style="background-image: url('images/page6.png');"></div>
    </div>

    <script>
        const pages = document.querySelectorAll('.page');
        let currentPage = 0;
        const intervalTime = 4000;

        function autoSlide() {
            pages[currentPage].classList.remove('active');
            currentPage = (currentPage + 1) % pages.length;
            pages[currentPage].classList.add('active');
        }

        setInterval(autoSlide, intervalTime);
    </script>
</body>
</html>
